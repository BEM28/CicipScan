name: cicipscan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
    
  #--------------- Packages ----------- ---#
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  image_picker: ^1.1.2
  camera: ^0.11.0
  tflite_flutter: ^0.12.1
  image: ^4.8.0
  crop_image: ^1.0.17
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  path: ^1.9.0
  lottie: ^3.3.3
  http: ^1.6.0
  rename: ^3.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  #--------------- LOCAL ASSETS ----------- ---#
  assets:
    - .env
    - assets/
    - assets/images/
    - assets/lotties/
    - assets/models/

  #--------------- LOCAL FONTS ---------------#
  fonts:
    - family: "Montserrat"
      fonts:
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Italic.ttf
          style: italic
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
